{% extends "base.html" %}
{% block title %}{{ 'Edit' if supplier else 'New' }} Supplier — Metro Events{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{{ url_for('suppliers.list_suppliers') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
  <h2>{{ '✏️ Edit' if supplier else '➕ New' }} Supplier</h2>
</div>

<div class="card shadow-sm" style="max-width:700px">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label fw-bold">Company Name *</label>
          <input type="text" name="company_name" class="form-control" required
                 value="{{ supplier.company_name if supplier else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Category</label>
          <input type="text" name="category" class="form-control"
                 placeholder="Florist, Sound, Catering…"
                 value="{{ supplier.category if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Contact Person</label>
          <input type="text" name="contact_person" class="form-control"
                 value="{{ supplier.contact_person if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ supplier.phone if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ supplier.email if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Rating (1–5)</label>
          <input type="number" name="rating" class="form-control"
                 min="1" max="5" step="0.1"
                 value="{{ supplier.rating if supplier else '5.0' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" rows="2">{{ supplier.address if supplier else '' }}</textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ supplier.notes if supplier else '' }}</textarea>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_preferred"
                   value="1" id="chkPreferred"
                   {% if supplier and supplier.is_preferred %}checked{% endif %}>
            <label class="form-check-label" for="chkPreferred">
              ⭐ Mark as Preferred Supplier
            </label>
          </div>
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          {{ 'Save Changes' if supplier else 'Add Supplier' }}
        </button>
        <a href="{{ url_for('suppliers.list_suppliers') }}" class="btn btn-outline-secondary">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
