<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Setup — Metro Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .me-card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            width: 100%;
            max-width: 420px;
        }
        .btn-gold {
            background-color: #C9A84C;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            width: 100%;
        }
        .btn-gold:hover {
            background-color: #B3933E;
            color: white;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="me-card">
        <div class="text-center mb-4">
            <div style="font-size:2.2rem; font-weight:900; color:#1A1A2E; letter-spacing:1px;">⚡ Metro Events</div>
            <div style="color:#C9A84C; font-style:italic; font-size:.9rem; margin-top:4px;">Initial System Setup</div>
        </div>

        <h5 style="font-weight:800; color:#1A1A2E; margin-bottom:22px; text-align:center;">🔑 Create Admin Account</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
                <div class="alert alert-{{ 'danger' if cat=='error' else cat }} mb-3" style="font-size: 0.85rem;">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            
            <div class="mb-3">
                <label class="form-label" style="color:#4B5563; font-weight:600; font-size:0.8rem;">FULL NAME</label>
                <input type="text" name="name" class="form-control" placeholder="Emman" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label" style="color:#4B5563; font-weight:600; font-size:0.8rem;">EMAIL ADDRESS</label>
                <input type="email" name="email" class="form-control" placeholder="admin@metroevents.ph" required>
            </div>

            <div class="mb-4">
                <label class="form-label" style="color:#4B5563; font-weight:600; font-size:0.8rem;">PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn-gold">
                Complete System Setup
            </button>
        </form>

        <div class="text-center mt-4 pt-3" style="border-top: 1px solid #F3F4F6;">
            <a href="{{ url_for('auth.login') }}" style="color: #6B7280; text-decoration: none; font-size: 0.85rem;">
                ← Back to Login
            </a>
        </div>
    </div>
</div>

</body>
</html>
