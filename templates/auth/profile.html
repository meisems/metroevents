{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <div class="me-card">
    <div class="me-card-header"><h5>⚙️ Edit Profile</h5></div>
    <div class="me-card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-3">
          <label class="me-form-label">Name</label>
          <input type="text" name="name" class="me-form-control" value="{{ current_user.name }}" required />
        </div>
        <div class="mb-3">
          <label class="me-form-label">Phone</label>
          <input type="text" name="phone" class="me-form-control" value="{{ current_user.phone or '' }}" />
        </div>
        <div class="mb-3">
          <label class="me-form-label">Email</label>
          <input type="email" class="me-form-control" value="{{ current_user.email }}" disabled />
        </div>
        <hr class="divider" />
        <div class="mb-3">
          <label class="me-form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label>
          <input type="password" name="new_password" class="me-form-control" placeholder="••••••••" minlength="6" />
        </div>
        <button type="submit" class="btn-gold">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
